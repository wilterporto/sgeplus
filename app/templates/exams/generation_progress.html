{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="card shadow-sm p-5 text-center" style="width: 100%; max-width: 600px;">
        <h3 class="mb-4 text-primary">
            <i class="bi bi-gear-wide-connected spin-icon"></i> Gerando Avaliações...
        </h3>
        
        <p class="text-muted mb-4" id="progress-text">Iniciando o processo. Por favor, aguarde.</p>
        
        <div class="progress mb-3" style="height: 25px;">
            <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
                 role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                0%
            </div>
        </div>
        
        <div id="error-box" class="alert alert-danger mt-3 text-start" style="display: none;"></div>
    </div>
</div>

<style>
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
.spin-icon {
    display: inline-block;
    animation: spin 3s linear infinite;
}
</style>

{% block scripts %}
<script>
    const jobId = {{ job.id }};
    const checkStatusUrl = "{{ url_for('exams.check_generation_status', job_id=job.id) }}";
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const errorBox = document.getElementById('error-box');
    
    function updateProgress() {
        fetch(checkStatusUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'running' || data.status === 'pending') {
                    const pct = data.progress_percentage;
                    progressBar.style.width = pct + '%';
                    progressBar.textContent = pct + '%';
                    progressBar.setAttribute('aria-valuenow', pct);
                    
                    if (data.total_rows > 0) {
                        progressText.textContent = `Gerando ${data.processed_rows} de ${data.total_rows} avaliações.`;
                    }
                    
                    setTimeout(updateProgress, 1000);
                } else if (data.status === 'completed') {
                    progressBar.style.width = '100%';
                    progressBar.textContent = '100%';
                    progressBar.classList.remove('progress-bar-animated');
                    progressText.textContent = "Finalizado! Redirecionando...";
                    
                    setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, 1000);
                } else if (data.status === 'error') {
                    progressBar.classList.remove('bg-success', 'progress-bar-animated');
                    progressBar.classList.add('bg-danger');
                    progressText.textContent = "Ocorreu um erro na geração.";
                    errorBox.style.display = 'block';
                    errorBox.textContent = data.errors || "Erro desconhecido.";
                }
            })
            .catch(err => {
                console.error('Error fetching progress:', err);
                setTimeout(updateProgress, 2000);
            });
    }
    
    // Start polling
    setTimeout(updateProgress, 500);
</script>
{% endblock %}
{% endblock %}
