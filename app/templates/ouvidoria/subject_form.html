{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-white border-0 pb-0">
                <h4 class="text-primary mb-0"><i class="fas fa-edit"></i> Editar Assunto</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {{ form.hidden_tag() }}
                    <div class="mb-3">
                        <label class="form-label">{{ form.nature.label.text }} <span class="text-danger">*</span></label>
                        {{ form.nature(class="form-select") }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ form.name.label.text }} <span class="text-danger">*</span></label>
                        {{ form.name(class="form-control") }}
                    </div>
                    <div class="form-check form-switch mb-4">
                        {{ form.active(class="form-check-input", role="switch") }}
                        <label class="form-check-label">{{ form.active.label.text }}</label>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('ouvidoria.subject_list') }}" class="btn btn-outline-secondary">Cancelar</a>
                        {{ form.submit(class="btn btn-primary") }}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
